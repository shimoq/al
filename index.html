<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <title>Помоги Леше настроить микрофон</title>

  <style>
    @font-face {
      font-family: "Intro Friday";
      src: url("./INTROFRIDAY.TTF") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --white: #ffffff;
      --lime: #dcea4b;
      --lime-glow: rgba(220, 234, 75, 0.42);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --safe-right: env(safe-area-inset-right);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      width: 100%;
      height: 100svh;
      min-height: 100svh;
      overflow: hidden;
      overflow-x: hidden;
      position: fixed;
      inset: 0;
      background: #07122c;
      color: var(--white);
      font-family: "Intro Friday", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    button {
      border: 0;
      padding: 0;
      font: inherit;
      color: inherit;
      background: none;
      cursor: pointer;
      touch-action: manipulation;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 100svh;
      overflow: hidden;
      overflow-x: hidden;
      background: url("./BG.png") center center / cover no-repeat;
    }

    .screen {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: none;
      width: 100%;
      height: 100svh;
      min-height: 100svh;
      overflow: hidden;
      overflow-x: hidden;
      animation: screenIn 400ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .screen.active {
      display: flex;
    }

    /* —— Старт —— */
    .start-screen {
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding:
        calc(var(--safe-top))
        calc(20px + var(--safe-right))
        calc(20px + var(--safe-bottom))
        calc(20px + var(--safe-left));
    }

    .start-title {
      position: absolute;
      top: calc(20.5svh + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      width: min(340px, 92vw);
      margin: 0;
      font-size: clamp(26px, 6.8vw, 31px);
      line-height: 0.92;
      letter-spacing: -0.04em;
      text-wrap: balance;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.28);
    }

    .start-button {
      position: absolute;
      left: 50%;
      top: calc(46.5svh + var(--safe-top));
      transform: translateX(-50%);
      width: min(260px, 68vw);
      aspect-ratio: 817 / 348;
      background: url("./button.png") center / 100% 100% no-repeat;
      filter: drop-shadow(0 0 20px var(--lime-glow));
      transition: transform 150ms ease, filter 150ms ease;
    }

    .start-title,
    .start-button span,
    .quiz-title,
    .mic-label,
    .answer-btn,
    .final-name,
    .final-love,
    .final-birthday,
    .final-credits {
      text-transform: uppercase;
    }

    .start-button span {
      position: relative;
      top: -1px;
      display: block;
      font-size: clamp(24px, 6.2vw, 29px);
      line-height: 1;
      color: var(--white);
      letter-spacing: -0.045em;
    }

    .start-button:active {
      transform: translateX(-50%) scale(0.965);
    }

    /* —— Вопросы —— */
    .quiz-screen {
      flex-direction: column;
      align-items: center;
      padding:
        calc(11svh + var(--safe-top))
        calc(18px + var(--safe-right))
        calc(22px + var(--safe-bottom))
        calc(18px + var(--safe-left));
    }

    .quiz-screen.has-mascot {
      padding-bottom: calc(8px + var(--safe-bottom));
    }

    .quiz-title {
      margin: 0 0 0;
      width: min(340px, 92vw);
      font-size: clamp(24px, 6.4vw, 30px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
      flex-shrink: 0;
    }

    .quiz-title--two-line {
      line-height: 0.92;
    }

    .quiz-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 0;
      margin-top: clamp(24px, 5svh, 40px);
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 2.2svh, 14px);
      width: min(340px, 88vw);
    }

    .answer-btn {
      width: 100%;
      min-height: 56px;
      padding: 14px 16px;
      border-radius: 18px;
      background: var(--lime);
      color: var(--white);
      font-size: clamp(20px, 5.2vw, 24px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      text-align: center;
      box-shadow:
        0 0 22px var(--lime-glow),
        0 4px 12px rgba(0, 0, 0, 0.15);
      transition: transform 150ms ease;
    }

    .answer-btn--multiline {
      padding: 12px 14px;
      font-size: clamp(18px, 4.8vw, 22px);
      line-height: 0.92;
    }

    .answer-btn:active {
      transform: scale(0.975);
    }

    .answers--three {
      gap: clamp(12px, 2.5svh, 16px);
    }

    /* —— Выбор микрофона —— */
    .mic-screen {
      padding-top: calc(10svh + var(--safe-top));
    }

    .mic-options {
      gap: clamp(36px, 9svh, 56px);
      margin-top: clamp(28px, 6svh, 44px);
    }

    .mic-row {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 390px;
      gap: 8px;
      padding: 4px 0;
    }

    .mic-row--neumann {
      justify-content: flex-start;
      padding-left: clamp(0px, 2vw, 12px);
    }

    .mic-row--shure {
      justify-content: flex-end;
      padding-right: clamp(0px, 2vw, 8px);
    }

    .mic-row img {
      display: block;
      height: auto;
      object-fit: contain;
      flex-shrink: 0;
    }

    .mic-row--neumann img {
      width: min(168px, 44vw);
      margin-right: 4px;
    }

    .mic-row--shure img {
      width: min(155px, 40vw);
      margin-left: 4px;
    }

    .mic-label {
      font-size: clamp(28px, 7.5vw, 36px);
      line-height: 1;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.22);
      flex-shrink: 0;
    }

    .mic-row--neumann .mic-label {
      flex: 1;
      text-align: left;
      padding-left: 8px;
    }

    .mic-row--shure .mic-label {
      flex: 1;
      text-align: right;
      padding-right: 12px;
    }

    /* —— Последний вопрос + персонаж —— */
    .mascot {
      position: absolute;
      right: 0;
      bottom: 0;
      width: min(72vw, 300px);
      max-height: 52svh;
      object-fit: contain;
      object-position: right bottom;
      pointer-events: none;
      z-index: 2;
    }

    /* —— Финал —— */
    .final-screen {
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
      padding:
        calc(14svh + var(--safe-top))
        calc(24px + var(--safe-right))
        calc(16px + var(--safe-bottom))
        calc(24px + var(--safe-left));
    }

    .final-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(6px, 1.5svh, 10px);
    }

    .final-name {
      margin: 0;
      font-size: clamp(36px, 9.5vw, 44px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      text-transform: uppercase;
    }

    .final-love {
      margin: 0;
      font-size: clamp(22px, 5.8vw, 27px);
      line-height: 0.92;
      letter-spacing: -0.04em;
      text-transform: uppercase;
    }

    .final-heart {
      width: min(120px, 32vw);
      height: auto;
      display: block;
      filter: drop-shadow(0 0 18px var(--lime-glow));
    }

    .final-birthday {
      margin: 0;
      font-size: clamp(26px, 6.8vw, 32px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      text-transform: uppercase;
    }

    .final-credits {
      margin: 0;
      font-size: clamp(14px, 3.8vw, 17px);
      line-height: 1;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      opacity: 0.95;
    }

    @keyframes screenIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-height: 700px) {
      .start-title {
        top: calc(17svh + var(--safe-top));
      }

      .start-button {
        top: calc(44svh + var(--safe-top));
      }

      .quiz-screen {
        padding-top: calc(8svh + var(--safe-top));
      }

      .mic-options {
        gap: 28px;
      }

      .final-screen {
        padding-top: calc(10svh + var(--safe-top));
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="screen start-screen active" id="startScreen">
      <h1 class="start-title">Помоги Леше<br>настроить микрофон</h1>
      <button class="start-button" id="startButton" type="button" aria-label="Начать">
        <span>Начать</span>
      </button>
    </section>

    <section class="screen quiz-screen" id="quizScreen" aria-live="polite"></section>

    <section class="screen final-screen" id="finalScreen">
      <div class="final-top">
        <h2 class="final-name">Леша</h2>
        <p class="final-love">Мы тебя очень<br>любим</p>
      </div>
      <img class="final-heart" src="./heart.png" width="120" height="120" alt="" />
      <p class="final-birthday">Happy Birthday</p>
      <p class="final-credits">By Shimo x Sasha</p>
    </section>
  </main>

  <script>
    const steps = [
      { type: "mic" },
      {
        type: "buttons",
        title: "Ты только включил майк. Что скажешь?",
        answers: [
          "Распрас",
          "Ц-ц-ц",
          { lines: ["Подпоешь", "фоновой песне"], multiline: true },
          "Саня"
        ]
      },
      {
        type: "buttons",
        title: "Выбери песню для отстройки",
        answers: [
          { lines: ["Опиум для", "никого"], multiline: true },
          { lines: ["Опиум для", "никого"], multiline: true },
          { lines: ["Опиум для", "никого"], multiline: true },
          { lines: ["Опиум для", "никого"], multiline: true }
        ]
      },
      {
        type: "buttons",
        title: "Майк фонит. Кто виноват?",
        answers: ["Саша", "Костя", "Индига", "Не я"]
      },
      {
        type: "buttons",
        title: "Что скажешь после первой песни?",
        answers: [
          "Сань, ревера нет вообще",
          "Он меня не тянет",
          "Звук как из бочки",
          "Хочется нижней серединки"
        ]
      },
      {
        type: "buttons",
        title: "Кто виноват в плохом звуке?",
        answers: ["Компрессор", "Эквалайзер", "Ревер", "Диэссер"]
      },
      {
        type: "buttons",
        title: "Базовая фраза?",
        answers: [
          "Добрый вечер",
          { lines: ["Не очень плотный", "добрый вечер"], multiline: true },
          "Костян, давай",
          "Ы :)"
        ]
      },
      {
        type: "buttons",
        title: ["Последний вопрос...", "Кто больше секси?"],
        answers: ["Grandma3", "Yamaha DM7", "Индига"],
        mascot: true
      }
    ];

    let stepIndex = 0;

    const startScreen = document.getElementById("startScreen");
    const quizScreen = document.getElementById("quizScreen");
    const finalScreen = document.getElementById("finalScreen");
    const startButton = document.getElementById("startButton");

    function showScreen(screen) {
      [startScreen, quizScreen, finalScreen].forEach((s) => s.classList.remove("active"));
      screen.classList.add("active");
    }

    function toUpperDisplay(text) {
      return text.toLocaleUpperCase("ru-RU");
    }

    function renderMic() {
      quizScreen.className = "screen quiz-screen mic-screen active";
      quizScreen.innerHTML = `
        <h2 class="quiz-title">Выбери микрофон</h2>
        <div class="quiz-body mic-options">
          <button type="button" class="mic-row mic-row--neumann" data-next>
            <img src="./neumann.png" alt="" width="168" height="168" />
            <span class="mic-label">Neumann</span>
          </button>
          <button type="button" class="mic-row mic-row--shure" data-next>
            <span class="mic-label">Shure</span>
            <img src="./shure55.png" alt="" width="155" height="155" />
          </button>
        </div>
      `;
      quizScreen.querySelectorAll("[data-next]").forEach((btn) => {
        btn.addEventListener("click", goNext);
      });
    }

    function renderButtons(step) {
      const twoLines = Array.isArray(step.title);
      const titleHtml = twoLines
        ? step.title.map((line) => toUpperDisplay(line)).join("<br>")
        : toUpperDisplay(step.title);

      const three = step.answers.length === 3;
      const mascot = step.mascot
        ? '<img class="mascot" src="./indigo.png" alt="" />'
        : "";

      quizScreen.className =
        "screen quiz-screen active" + (step.mascot ? " has-mascot" : "");

      const buttonsHtml = step.answers
        .map((answer) => {
          if (typeof answer === "string") {
            return `<button type="button" class="answer-btn" data-next>${toUpperDisplay(answer)}</button>`;
          }
          const cls = answer.multiline ? " answer-btn--multiline" : "";
          const inner = answer.lines.map((l) => toUpperDisplay(l)).join("<br>");
          return `<button type="button" class="answer-btn${cls}" data-next>${inner}</button>`;
        })
        .join("");

      quizScreen.innerHTML = `
        <h2 class="quiz-title${twoLines ? " quiz-title--two-line" : ""}">${titleHtml}</h2>
        <div class="quiz-body">
          <div class="answers${three ? " answers--three" : ""}">${buttonsHtml}</div>
        </div>
        ${mascot}
      `;

      quizScreen.querySelectorAll("[data-next]").forEach((btn) => {
        btn.addEventListener("click", goNext);
      });
    }

    function renderStep() {
      const step = steps[stepIndex];
      if (step.type === "mic") {
        renderMic();
        return;
      }
      if (step.type === "buttons") {
        renderButtons(step);
      }
    }

    function goNext() {
      stepIndex += 1;
      if (stepIndex < steps.length) {
        renderStep();
        showScreen(quizScreen);
        return;
      }
      showScreen(finalScreen);
    }

    function startQuiz() {
      stepIndex = 0;
      renderStep();
      showScreen(quizScreen);
    }

    startButton.addEventListener("click", startQuiz);
  </script>
</body>
</html>
